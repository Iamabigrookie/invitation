<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 约会邀请函</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
/* ========================================
   DESIGN SYSTEM — Romantic Night Sky Invitation
   Palette:
     - Deep night:   #0d0f1c
     - Night blue:   #161b33
     - Twilight:     #1e2450
     - Gold foil:    #c9a84c
     - Rose gold:    #c97b84
     - Paper white:  #faf7f2
     - Warm cream:   #f5efe0
   Type:
     - Display:  Playfair Display (Latin), Noto Serif SC (CJK)
     - Accent:   Ma Shan Zheng (handwritten)
     - Body:     Noto Serif SC
   Signature: Constellation lines tracing a heart in the night sky
   ======================================== */

:root {
  --night-deep: #0d0f1c;
  --night-mid: #161b33;
  --twilight: #1e2450;
  --gold: #c9a84c;
  --gold-light: #e4d5a7;
  --gold-dark: #9b7a2e;
  --rose: #c97b84;
  --paper: #faf7f2;
  --cream: #f5efe0;
  --text: #3d3226;
  --text-light: #6b5e4f;
  --star-glow: #fff8e7;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

body {
  min-height: 100vh;
  background: linear-gradient(170deg, var(--night-deep) 0%, var(--night-mid) 40%, var(--twilight) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif SC', 'Playfair Display', 'Times New Roman', serif;
  color: var(--text);
  overflow-x: hidden;
  cursor: default;
}

/* ---- Night Sky: Stars ---- */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: var(--star-glow);
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50%      { opacity: 0.9; transform: scale(1.3); }
}

/* ---- Constellation Lines ---- */
.constellation {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.constellation svg {
  width: 100%;
  height: 100%;
}
.constellation line {
  stroke: var(--gold);
  stroke-width: 0.5;
  opacity: 0.15;
  stroke-dasharray: 4 3;
  animation: constellationPulse 4s ease-in-out infinite;
}
@keyframes constellationPulse {
  0%, 100% { opacity: 0.1; }
  50%      { opacity: 0.25; }
}

/* ---- Floating Sparkles (canvas) ---- */
#sparkles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

/* ---- Main Card ---- */
.card-wrapper {
  position: relative;
  z-index: 10;
  width: 90vw;
  max-width: 520px;
  margin: 2rem;
  animation: cardEnter 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
}
@keyframes cardEnter {
  from { opacity: 0; transform: translateY(40px) scale(0.94); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card {
  position: relative;
  background: linear-gradient(135deg, var(--paper) 0%, var(--cream) 100%);
  border-radius: 2px;
  padding: 3.5rem 2.5rem 2.5rem;
  box-shadow:
    0 2px 20px rgba(0,0,0,0.3),
    0 0 0 1px rgba(201,168,76,0.2),
    0 30px 60px rgba(0,0,0,0.4);
  text-align: center;
  /* Paper texture via subtle noise */
  background-image:
    linear-gradient(135deg, var(--paper) 0%, var(--cream) 100%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
}

/* Gold border effect */
.card::before {
  content: '';
  position: absolute;
  inset: 10px;
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 1px;
  pointer-events: none;
}

/* Gold corner ornaments */
.card::after {
  content: '';
  position: absolute;
  inset: 18px;
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 1px;
  pointer-events: none;
}

/* ---- Wax Seal ---- */
.seal {
  position: absolute;
  top: -35px;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #c44545, #8b1a1a 60%, #5c0e0e 100%);
  box-shadow:
    0 4px 15px rgba(0,0,0,0.35),
    inset 0 -2px 4px rgba(0,0,0,0.3),
    inset 0 2px 4px rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  z-index: 5;
  animation: sealBreathe 3s ease-in-out infinite;
}
.seal:hover {
  transform: translateX(-50%) scale(1.08);
  box-shadow:
    0 6px 25px rgba(0,0,0,0.4),
    0 0 30px rgba(201,168,76,0.3),
    inset 0 -2px 4px rgba(0,0,0,0.3),
    inset 0 2px 4px rgba(255,255,255,0.1);
}
.seal:active {
  transform: translateX(-50%) scale(0.95);
}
@keyframes sealBreathe {
  0%, 100% { box-shadow: 0 4px 15px rgba(0,0,0,0.35), 0 0 0px rgba(201,168,76,0); }
  50%      { box-shadow: 0 4px 15px rgba(0,0,0,0.35), 0 0 18px rgba(201,168,76,0.25); }
}

.seal-icon {
  font-size: 28px;
  color: #f0d0a0;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  user-select: none;
  line-height: 1;
}

/* ---- Card Content ---- */
.card-header {
  margin-top: 0.8rem;
  margin-bottom: 1.8rem;
}

.eyebrow {
  font-family: 'Playfair Display', 'Noto Serif SC', serif;
  font-size: 0.75rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 0.6rem;
}

/* Gold foil title */
.gold-title {
  font-family: 'Noto Serif SC', 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  background: linear-gradient(160deg,
    var(--gold-dark) 0%,
    #b8922e 15%,
    var(--gold-light) 35%,
    #fff8dc 50%,
    var(--gold-light) 65%,
    #b8922e 85%,
    var(--gold-dark) 100%
  );
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldShimmer 5s ease-in-out infinite;
  margin-bottom: 0.3rem;
}
@keyframes goldShimmer {
  0%, 100% { background-position: 0% center; }
  50%      { background-position: 100% center; }
}

.subtitle {
  font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
  font-size: 1.3rem;
  color: var(--rose);
  letter-spacing: 0.05em;
  opacity: 0.85;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  margin: 1.5rem 0;
}
.divider::before,
.divider::after {
  content: '';
  height: 1px;
  width: 50px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.divider-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.6;
}

/* Main message */
.message {
  font-size: 1.05rem;
  line-height: 2;
  color: var(--text);
  letter-spacing: 0.04em;
}

.message .highlight {
  color: var(--rose);
  font-weight: 600;
}

/* Date highlight box */
.date-box {
  display: inline-block;
  margin: 1.8rem 0 1.2rem;
  padding: 0.8rem 2rem;
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 2px;
  background: rgba(201,168,76,0.04);
}
.date-main {
  font-family: 'Playfair Display', 'Noto Serif SC', serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--gold-dark);
  letter-spacing: 0.06em;
}
.date-sub {
  font-size: 0.8rem;
  color: var(--text-light);
  letter-spacing: 0.1em;
  margin-top: 0.2rem;
}

/* Details */
.details {
  margin: 1rem 0 0.5rem;
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 2;
  letter-spacing: 0.04em;
}
.details .emoji-bullet {
  display: inline-block;
  width: 1.5em;
  text-align: center;
}

/* Signature */
.signature {
  margin-top: 2rem;
  font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
  font-size: 1rem;
  color: var(--text-light);
  letter-spacing: 0.06em;
  opacity: 0.8;
}

/* RSVP hearts */
.hearts-row {
  margin-top: 1.5rem;
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  font-size: 1.4rem;
  animation: heartsFloat 4s ease-in-out infinite;
}
@keyframes heartsFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

/* ---- Ripple effect on seal click ---- */
.ripple {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(201,168,76,0.4);
  transform: translate(-50%, -50%);
  animation: rippleOut 0.8s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleOut {
  to { width: 300px; height: 300px; opacity: 0; }
}

/* ---- Floating hearts from seal ---- */
.heart-particle {
  position: fixed;
  pointer-events: none;
  z-index: 20;
  font-size: 1.2rem;
  animation: heartRise 2s ease-out forwards;
}
@keyframes heartRise {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(0.5); }
  60%  { opacity: 0.8; }
  100% { opacity: 0; transform: translateY(-160px) rotate(var(--rot)) scale(1.2); }
}

/* ---- Responsive ---- */
@media (max-width: 540px) {
  .card {
    padding: 3rem 1.5rem 2rem;
  }
  .gold-title {
    font-size: 1.7rem;
  }
  .message {
    font-size: 0.95rem;
    line-height: 1.9;
  }
  .date-main {
    font-size: 1.25rem;
  }
  .seal {
    width: 56px;
    height: 56px;
    top: -28px;
  }
  .seal-icon {
    font-size: 22px;
  }
}

@media (max-width: 380px) {
  .card {
    padding: 2.5rem 1.2rem 1.8rem;
  }
  .gold-title {
    font-size: 1.4rem;
  }
}

/* ---- Reduced Motion ---- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ---- Focus ---- */
.seal:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 4px;
}
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars" aria-hidden="true"></div>

<!-- Constellation heart -->
<div class="constellation" aria-hidden="true">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <!-- Heart constellation lines (stylized, subtle) -->
    <line x1="580" y1="140" x2="520" y2="220" />
    <line x1="580" y1="140" x2="640" y2="220" />
    <line x1="520" y1="220" x2="480" y2="320" />
    <line x1="640" y1="220" x2="700" y2="320" />
    <line x1="480" y1="320" x2="530" y2="420" />
    <line x1="700" y1="320" x2="650" y2="420" />
    <line x1="530" y1="420" x2="590" y2="500" />
    <line x1="650" y1="420" x2="590" y2="500" />
    <!-- Extra constellation connecting lines in corners -->
    <line x1="120" y1="180" x2="200" y2="160" />
    <line x1="200" y1="160" x2="260" y2="220" />
    <line x1="1260" y1="200" x2="1320" y2="160" />
    <line x1="1320" y1="160" x2="1360" y2="230" />
    <line x1="150" y1="680" x2="230" y2="720" />
    <line x1="230" y1="720" x2="280" y2="680" />
    <line x1="1200" y1="700" x2="1280" y2="740" />
    <line x1="1280" y1="740" x2="1350" y2="700" />
  </svg>
</div>

<!-- Sparkle canvas -->
<canvas id="sparkles" aria-hidden="true"></canvas>

<!-- Invitation Card -->
<div class="card-wrapper">
  <div class="card" id="card">

    <!-- Wax Seal -->
    <button class="seal" id="seal" aria-label="点击打开邀请函">
      <span class="seal-icon">💝</span>
    </button>

    <!-- Content -->
    <div class="card-header">
      <div class="eyebrow">— Invitation —</div>
      <h1 class="gold-title">约会邀请函</h1>
      <p class="subtitle">致 亲爱的支支</p>
    </div>

    <div class="divider">
      <span class="divider-dot"></span>
    </div>

    <p class="message">
      想在这个<span class="highlight">周六</span>，<br>
      邀你一起度过浪漫的一天。<br>
      只有你和我，<br>
      和所有美好的可能。
    </p>

    <div class="date-box">
      <div class="date-main">2026 · 07 · 04</div>
      <div class="date-sub">星 期 六</div>
    </div>

    <div class="details">
      <p><span class="emoji-bullet">🕐</span> 时间：___________</p>
      <p><span class="emoji-bullet">📍</span> 地点：___________</p>
    </div>

    <p class="signature">
      —— 等你，不见不散<br><span style="font-size:0.85rem;opacity:0.7;">From Yjzzz</span>
    </p>

    <div class="hearts-row" aria-hidden="true">💕 ✨ 💕</div>
  </div>
</div>

<script>
// ========== Generate CSS Stars ==========
(function() {
  const starsEl = document.getElementById('stars');
  const COUNT = 120;
  let html = '';
  for (let i = 0; i < COUNT; i++) {
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const size = Math.random() * 2.5 + 1;
    const dur = Math.random() * 3 + 2;
    const delay = Math.random() * 5;
    html += `<div class="star" style="
      left:${x}%; top:${y}%;
      width:${size}px; height:${size}px;
      --dur:${dur}s; --delay:${delay}s;
    "></div>`;
  }
  starsEl.innerHTML = html;
})();

// ========== Sparkle Particles Canvas ==========
(function() {
  const canvas = document.getElementById('sparkles');
  const ctx = canvas.getContext('2d');
  let w, h;
  const particles = [];
  const MAX = 35;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Sparkle {
    constructor() {
      this.reset(true);
    }
    reset(initial) {
      this.x = Math.random() * w;
      this.y = initial ? Math.random() * h : h + 10;
      this.size = Math.random() * 2 + 0.8;
      this.speedY = -(Math.random() * 0.4 + 0.15);
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.6 + 0.1;
      this.fade = Math.random() * 0.004 + 0.002;
      this.life = 1;
    }
    update() {
      this.y += this.speedY;
      this.x += this.speedX;
      this.life -= this.fade;
      if (this.life <= 0 || this.y < -10) this.reset(false);
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.opacity * this.life;
      ctx.fillStyle = '#e4d5a7';
      ctx.shadowColor = '#c9a84c';
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (let i = 0; i < MAX; i++) particles.push(new Sparkle());

  function animate() {
    ctx.clearRect(0, 0, w, h);
    for (const p of particles) {
      p.update();
      p.draw(ctx);
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// ========== Wax Seal Interaction ==========
(function() {
  const seal = document.getElementById('seal');
  const card = document.getElementById('card');

  function spawnHearts(clientX, clientY) {
    const emojis = ['💕', '✨', '💖', '💫', '🩷', '🌟'];
    for (let i = 0; i < 6; i++) {
      const el = document.createElement('span');
      el.className = 'heart-particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = clientX + 'px';
      el.style.top = clientY + 'px';
      el.style.setProperty('--rot', (Math.random() - 0.5) * 60 + 'deg');
      el.style.animationDelay = (i * 0.08) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  seal.addEventListener('click', (e) => {
    // Ripple
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    seal.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());

    // Floating hearts
    spawnHearts(e.clientX, e.clientY);

    // Card subtle bounce
    card.style.transition = 'transform 0.3s ease';
    card.style.transform = 'scale(1.02)';
    setTimeout(() => { card.style.transform = 'scale(1)'; }, 300);
  });
})();
</script>
</body>
</html>
