<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 约会邀请函</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ==========================================
   Night Sky Invitation v2 — Aurora + 3D Card
   ========================================== */

:root {
  --night: #080c1a;
  --aurora-purple: rgba(120, 40, 120, 0.22);
  --aurora-teal:   rgba(180, 60, 100, 0.16);
  --aurora-rose:   rgba(200, 45, 80, 0.15);
  --gold:       #d4af4e;
  --gold-light: #efe0b0;
  --gold-dark:  #9b7a2e;
  --rose:       #d4838e;
  --paper:      #faf7f2;
  --cream:      #f5efe0;
  --text:       #3d3226;
  --text-light: #6b5e4f;
  --star-bright: #fffef5;
  --star-warm:   #ffe9c8;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { font-size:16px; -webkit-font-smoothing:antialiased; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--night);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif SC', 'STSongti-SC', 'Songti SC', 'SimSun', serif;
  color: var(--text);
  overflow: hidden;
  cursor: default;
  user-select: none;
}

/* ===== Aurora Layers ===== */
.aurora {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.7;
  animation: auroraDrift var(--ad) ease-in-out infinite;
  animation-delay: var(--adelay);
}
@keyframes auroraDrift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25%      { transform: translate(8vw, -6vh) scale(1.15); }
  50%      { transform: translate(-4vw, 4vh) scale(0.9); }
  75%      { transform: translate(6vw, -2vh) scale(1.1); }
}

/* ===== Stars ===== */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: var(--star-bright);
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
  opacity: 0;
}
.star.warm {
  background: var(--star-warm);
}
.star.bright {
  box-shadow: 0 0 6px 1px rgba(255,254,245,0.5);
}
@keyframes twinkle {
  0%, 100% { opacity:0.15; transform:scale(1); }
  30%      { opacity:1;    transform:scale(1.5); }
  60%      { opacity:0.3;  transform:scale(0.8); }
}

/* ===== Moon ===== */
.moon {
  position: fixed;
  top: 11%;
  right: 14%;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 55% 45%, #fffef0 0%, #f5e8c8 40%, #e0c880 100%);
  box-shadow:
    0 0 30px rgba(255,248,220,0.35),
    0 0 80px rgba(255,248,220,0.12),
    0 0 140px rgba(200,160,80,0.06);
  pointer-events: none;
  z-index: 0;
  animation: moonGlow 5s ease-in-out infinite;
}
@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(255,248,220,0.35), 0 0 80px rgba(255,248,220,0.12); }
  50%      { box-shadow: 0 0 45px rgba(255,248,220,0.5), 0 0 100px rgba(255,248,220,0.2); }
}
/* Crescent cutout */
.moon::after {
  content: '';
  position: absolute;
  top: 10px;
  right: 15px;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: radial-gradient(circle at 45% 45%, var(--night) 0%, #0a0e20 100%);
}

/* ===== Shooting Stars ===== */
.shooting-star {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 6px 1px rgba(255,255,255,0.9);
  animation: shoot var(--ssdur) ease-out forwards;
  animation-delay: var(--ssdelay);
}
.shooting-star::after {
  content: '';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: var(--trail);
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
  right: 4px;
}
@keyframes shoot {
  0%   { opacity:1; transform: translate(0, 0); }
  30%  { opacity:1; }
  100% { opacity:0; transform: translate(var(--sdx), var(--sdy)); }
}

/* ===== Sparkle Canvas ===== */
#sparkles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

/* ===== 3D Card ===== */
.card-scene {
  position: relative;
  z-index: 10;
  perspective: 1200px;
  width: 90vw;
  max-width: 520px;
  margin: 2rem;
}
.card-wrapper {
  transform-style: preserve-3d;
  transition: transform 0.15s ease-out;
  will-change: transform;
}
.card-wrapper.entered {
  animation: cardEnter 1s cubic-bezier(0.22, 0.61, 0.36, 1) both;
}
@keyframes cardEnter {
  from { opacity:0; transform: translateY(50px) scale(0.85) rotateX(10deg); }
  to   { opacity:1; transform: translateY(0) scale(1) rotateX(0); }
}

.card {
  position: relative;
  background: linear-gradient(160deg, var(--paper) 0%, #f8f3e8 40%, var(--cream) 100%);
  border-radius: 3px;
  padding: 3.8rem 2.8rem 2.8rem;
  box-shadow:
    0 0 0 1px rgba(212,175,78,0.25),
    0 4px 24px rgba(0,0,0,0.25),
    0 30px 60px rgba(0,0,0,0.5);
  text-align: center;
  transition: box-shadow 0.3s ease;
}

/* Gold inner border */
.card::before {
  content: '';
  position: absolute;
  inset: 10px;
  border: 1px solid rgba(212,175,78,0.28);
  border-radius: 2px;
  pointer-events: none;
}
.card::after {
  content: '';
  position: absolute;
  inset: 18px;
  border: 1px solid rgba(212,175,78,0.1);
  border-radius: 2px;
  pointer-events: none;
}

/* Card glow (intensifies with tilt) */
.card-glow {
  position: absolute;
  inset: -30px;
  border-radius: 8px;
  background: radial-gradient(ellipse at center, rgba(212,175,78,0.08) 0%, transparent 70%);
  pointer-events: none;
  opacity: 0.5;
  transition: opacity 0.3s;
}

/* ===== Wax Seal ===== */
.seal {
  position: absolute;
  top: -38px;
  left: 50%;
  transform: translateX(-50%);
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #d45555, #9e1f1f 55%, #6b1010 100%);
  box-shadow:
    0 5px 20px rgba(0,0,0,0.4),
    inset 0 -3px 5px rgba(0,0,0,0.35),
    inset 0 3px 5px rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 5;
  animation: sealPulse 3s ease-in-out infinite;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  border: none;
  outline: none;
}
.seal:hover {
  transform: translateX(-50%) scale(1.1);
  box-shadow:
    0 6px 25px rgba(0,0,0,0.45),
    0 0 35px rgba(212,175,78,0.4),
    inset 0 -3px 5px rgba(0,0,0,0.35),
    inset 0 3px 5px rgba(255,255,255,0.08);
}
.seal:active {
  transform: translateX(-50%) scale(0.93);
}
.seal:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 5px;
}
@keyframes sealPulse {
  0%, 100% { box-shadow: 0 5px 20px rgba(0,0,0,0.4), 0 0 0px rgba(212,175,78,0); }
  50%      { box-shadow: 0 5px 20px rgba(0,0,0,0.4), 0 0 22px rgba(212,175,78,0.35); }
}

.seal-icon {
  font-size: 30px;
  color: #f0d0a0;
  text-shadow: 0 2px 3px rgba(0,0,0,0.5);
  user-select: none;
  pointer-events: none;
  line-height: 1;
}

/* ===== Typography ===== */
.card-header {
  margin-top: 0.6rem;
  margin-bottom: 1.6rem;
}
.eyebrow {
  font-family: 'Playfair Display', serif;
  font-size: 0.8rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 0.6rem;
  opacity: 0.7;
}

.gold-title {
  font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', 'STSongti-SC', serif;
  font-size: 3rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  background: linear-gradient(160deg,
    #8a6d20 0%, #bf9b3a 18%, #efe0b0 38%,
    #fff8e8 50%, #efe0b0 62%, #bf9b3a 82%, #8a6d20 100%
  );
  background-size: 220% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldFlow 6s ease-in-out infinite;
}
@keyframes goldFlow {
  0%, 100% { background-position: 0% center; }
  50%      { background-position: 100% center; }
}

.subtitle {
  font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
  font-size: 1.5rem;
  color: var(--rose);
  letter-spacing: 0.06em;
  opacity: 0.85;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.7rem;
  margin: 1.5rem 0 1.2rem;
}
.divider-line {
  height: 1px;
  width: 44px;
  background: linear-gradient(90deg, transparent, rgba(212,175,78,0.5), transparent);
}
.divider-diamond {
  width: 5px;
  height: 5px;
  transform: rotate(45deg);
  border: 1px solid rgba(212,175,78,0.5);
  background: transparent;
}

/* Message */
.message {
  font-size: 1.2rem;
  line-height: 2.3;
  color: var(--text);
  letter-spacing: 0.05em;
}
.message em {
  font-style: normal;
  color: var(--rose);
  font-weight: 600;
}

/* Date */
.date-box {
  display: inline-block;
  margin: 1.8rem 0 1.2rem;
  padding: 0.8rem 2rem;
  border: 1px solid rgba(212,175,78,0.35);
  border-radius: 2px;
  background: rgba(212,175,78,0.03);
}
.date-main {
  font-family: 'Playfair Display', 'Noto Serif SC', serif;
  font-size: 1.65rem;
  font-weight: 600;
  color: var(--gold-dark);
  letter-spacing: 0.08em;
}
.date-sub {
  font-size: 0.85rem;
  color: var(--text-light);
  letter-spacing: 0.12em;
  margin-top: 0.25rem;
}

/* Details */
.details {
  margin: 0.8rem 0 0.3rem;
  font-size: 0.95rem;
  color: var(--text-light);
  line-height: 2.1;
  letter-spacing: 0.04em;
}
.details .bullet {
  display: inline-block;
  width: 1.4em;
  text-align: center;
}

/* Signature */
.signature {
  margin-top: 2rem;
  font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
  font-size: 1.1rem;
  color: var(--text-light);
  opacity: 0.8;
  line-height: 1.8;
}

/* Bottom hearts */
.hearts-row {
  margin-top: 1.2rem;
  font-size: 1.5rem;
  animation: floatHearts 4s ease-in-out infinite;
}
@keyframes floatHearts {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* ===== Floating Hearts (slow drift up) ===== */
.floating-hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
.floating-heart {
  position: absolute;
  font-size: 1.2rem;
  animation: heartDrift var(--fh-dur) ease-in-out infinite;
  animation-delay: var(--fh-delay);
  opacity: 0;
  filter: blur(0.8px);
}
@keyframes heartDrift {
  0%   { opacity:0; transform: translateY(0) translateX(0) rotate(0deg) scale(0.5); }
  10%  { opacity:0.55; }
  85%  { opacity:0.45; }
  100% { opacity:0; transform: translateY(-105vh) translateX(var(--fh-dx)) rotate(var(--fh-rot)) scale(1.1); }
}

/* ===== Ripple ===== */
.ripple {
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  border-radius: 50%;
  background: rgba(212,175,78,0.35);
  transform: translate(-50%, -50%);
  animation: rippleExpand 0.9s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleExpand {
  to { width:320px; height:320px; opacity:0; }
}

/* ===== Heart Particles ===== */
.heart-particle {
  position: fixed;
  pointer-events: none;
  z-index: 25;
  font-size: 1.3rem;
  animation: heartFly 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
@keyframes heartFly {
  0%   { opacity:1; transform: translateY(0) rotate(0deg) scale(0.4); }
  40%  { opacity:1; transform: translateY(-80px) rotate(var(--rot)) scale(1.1); }
  100% { opacity:0; transform: translateY(-180px) rotate(calc(var(--rot)*2)) scale(0.6); }
}

/* ===== Sparkle Burst ===== */
.burst-particle {
  position: fixed;
  pointer-events: none;
  z-index: 25;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--gold-light);
  box-shadow: 0 0 4px var(--gold);
  animation: burst var(--blife) ease-out forwards;
}
@keyframes burst {
  0%   { opacity:1; transform: translate(0,0) scale(1); }
  100% { opacity:0; transform: translate(var(--bx), var(--by)) scale(0); }
}

/* ===== Responsive ===== */
@media (max-width: 540px) {
  .card {
    padding: 3rem 1.4rem 2rem;
  }
  .gold-title { font-size:2.3rem; }
  .message { font-size:1.05rem; line-height:2.1; }
  .date-main { font-size:1.4rem; }
  .subtitle { font-size:1.3rem; }
  .seal { width:60px; height:60px; top:-30px; }
  .seal-icon { font-size:24px; }
  .moon { width:44px; height:44px; top:8%; right:8%; }
  .moon::after { width:34px; height:34px; top:5px; right:8px; }
}

@media (max-width: 380px) {
  .card { padding:2.5rem 1rem 1.6rem; }
  .gold-title { font-size:1.9rem; }
  .subtitle { font-size:1.2rem; }
  .message { font-size:0.95rem; }
  .date-main { font-size:1.2rem; }
}

/* ===== EDIT BUTTON ===== */
.edit-btn{position:fixed;bottom:24px;right:24px;z-index:100;width:48px;height:48px;border-radius:50%;background:rgba(30,30,50,0.85);backdrop-filter:blur(12px);border:1px solid rgba(212,175,78,0.3);color:rgba(255,255,255,0.85);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease}
.edit-btn:hover{background:rgba(40,40,60,0.9);border-color:var(--gold);color:#fff;box-shadow:0 0 20px rgba(212,175,78,0.25);transform:scale(1.05)}
.editor-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
.editor-overlay.open{opacity:1;pointer-events:auto}
.editor-panel{background:#1a1d2e;border:1px solid rgba(212,175,78,0.25);border-radius:12px;width:90vw;max-width:480px;max-height:85vh;overflow-y:auto;padding:2rem;box-shadow:0 20px 60px rgba(0,0,0,0.6);color:#e0d8c8}
.editor-panel h3{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold-light);margin-bottom:1.2rem;text-align:center;letter-spacing:0.05em}
.editor-field{margin-bottom:1rem}
.editor-field label{display:block;font-size:0.72rem;color:rgba(255,255,255,0.45);margin-bottom:0.3rem;letter-spacing:0.06em;text-transform:uppercase}
.editor-field input,.editor-field textarea{width:100%;padding:0.6rem 0.8rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#e0d8c8;font-size:0.95rem;font-family:'Noto Serif SC',serif;transition:border-color 0.2s;resize:vertical}
.editor-field input:focus,.editor-field textarea:focus{outline:none;border-color:var(--gold)}
.editor-field textarea{min-height:70px}
.editor-actions{display:flex;gap:0.8rem;margin-top:1.5rem}
.editor-actions button{flex:1;padding:0.7rem 1rem;border-radius:8px;border:none;font-size:0.9rem;cursor:pointer;font-family:'Noto Serif SC',serif;transition:all 0.2s}
.btn-save{background:linear-gradient(135deg,#bf9b3a,#d4af4e);color:#1a1d2e;font-weight:600}
.btn-save:hover{filter:brightness(1.1)}
.btn-close{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.1)!important}
.btn-close:hover{background:rgba(255,255,255,0.1);color:#fff}

/* ===== Reduced Motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .card-wrapper { transition: none !important; }
}
</style>
</head>
<body>

<!-- Aurora -->
<div class="aurora" aria-hidden="true">
  <div class="aurora-blob" style="
    width:55vw; height:55vw; max-width:700px; max-height:700px;
    top:-15%; left:5%;
    background:radial-gradient(circle, var(--aurora-purple), transparent);
    --ad:18s; --adelay:0s;
  "></div>
  <div class="aurora-blob" style="
    width:50vw; height:50vw; max-width:600px; max-height:600px;
    top:25%; right:-10%;
    background:radial-gradient(circle, var(--aurora-teal), transparent);
    --ad:22s; --adelay:-7s;
  "></div>
  <div class="aurora-blob" style="
    width:45vw; height:45vw; max-width:550px; max-height:550px;
    bottom:-10%; left:20%;
    background:radial-gradient(circle, var(--aurora-rose), transparent);
    --ad:20s; --adelay:-12s;
  "></div>
</div>

<!-- Stars -->
<div class="stars" id="stars" aria-hidden="true"></div>

<!-- Moon -->
<div class="moon" aria-hidden="true"></div>

<!-- Shooting Stars container -->
<div id="shootingStars" aria-hidden="true"></div>

<!-- Floating Hearts -->
<div class="floating-hearts" id="floatingHearts" aria-hidden="true"></div>

<!-- Sparkle Canvas -->
<canvas id="sparkles" aria-hidden="true"></canvas>

<!-- 3D Card Scene -->
<div class="card-scene" id="cardScene">
  <div class="card-wrapper entered" id="cardWrapper">
    <div class="card" id="card">

      <!-- Wax Seal -->
      <button class="seal" id="seal" aria-label="点击互动">
        <span class="seal-icon">❤️</span>
      </button>

      <!-- Content -->
      <div class="card-header">
        <div class="eyebrow" id="elEyebrow"></div>
        <h1 class="gold-title" id="elTitle"></h1>
        <p class="subtitle" id="elSubtitle"></p>
      </div>

      <div class="divider" aria-hidden="true">
        <span class="divider-line"></span>
        <span class="divider-diamond"></span>
        <span class="divider-line"></span>
      </div>

      <p class="message" id="elMessage"></p>

      <div class="date-box">
        <div class="date-main" id="elDate"></div>
        <div class="date-sub" id="elDateLabel"></div>
      </div>

      <div class="details">
        <p><span class="bullet">🕐</span> 时间：<span id="elTime"></span></p>
        <p><span class="bullet">📍</span> 地点：<span id="elLocation"></span></p>
      </div>

      <p class="signature" id="elSignature"></p>

      <div class="hearts-row" aria-hidden="true">💗 ✨ 💕 ✨ 💗</div>
    </div>
    <div class="card-glow" id="cardGlow"></div>
  </div>
</div>

<!-- EDIT BUTTON -->
<button class="edit-btn" id="editBtn" title="编辑内容">✏️</button>

<!-- EDITOR PANEL -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-panel">
    <h3>✏️ 编辑邀请函</h3>
    <div class="editor-field"><label>小标题</label><input id="fEyebrow"></div>
    <div class="editor-field"><label>大标题</label><input id="fTitle"></div>
    <div class="editor-field"><label>致谁</label><input id="fSubtitle"></div>
    <div class="editor-field"><label>正文（换行分段）</label><textarea id="fMessage" rows="4"></textarea></div>
    <div class="editor-field"><label>日期</label><input id="fDate"></div>
    <div class="editor-field"><label>日期说明</label><input id="fDateLabel"></div>
    <div class="editor-field"><label>时间</label><input id="fTime"></div>
    <div class="editor-field"><label>地点</label><input id="fLocation"></div>
    <div class="editor-field"><label>签名（首行大字，次行小字）</label><textarea id="fSignature" rows="2"></textarea></div>
    <div class="editor-actions">
      <button class="btn-save" id="btnSave">✓ 保存</button>
      <button class="btn-close" id="btnClose">取消</button>
    </div>
  </div>
</div>

<script>
// ==========================================
//  CONFIG — 只改这里！或用右下角 ✏️ 按钮
// ==========================================
var CONFIG = {
  eyebrow:  "— You're Invited —",
  title:    "约会邀请函",

function renderCard(cfg) {
  document.getElementById('elEyebrow').textContent = cfg.eyebrow;
  document.getElementById('elTitle').textContent = cfg.title;
  document.getElementById('elSubtitle').textContent = cfg.subtitle;
  document.getElementById('elMessage').innerHTML = cfg.message;
  document.getElementById('elDate').textContent = cfg.date;
  document.getElementById('elDateLabel').textContent = cfg.dateLabel;
  document.getElementById('elTime').textContent = cfg.time;
  document.getElementById('elLocation').textContent = cfg.location;
  document.getElementById('elSignature').innerHTML = cfg.signature;
}
renderCard(CONFIG);

function stripHtml(s) { return s.replace(/<br>/gi,'\n').replace(/<[^>]+>/g,''); }
function syncForm() {
  document.getElementById('fEyebrow').value = CONFIG.eyebrow;
  document.getElementById('fTitle').value = CONFIG.title;
  document.getElementById('fSubtitle').value = CONFIG.subtitle;
  document.getElementById('fMessage').value = stripHtml(CONFIG.message);
  document.getElementById('fDate').value = CONFIG.date;
  document.getElementById('fDateLabel').value = CONFIG.dateLabel;
  document.getElementById('fTime').value = CONFIG.time;
  document.getElementById('fLocation').value = CONFIG.location;
  document.getElementById('fSignature').value = stripHtml(CONFIG.signature);
}
syncForm();

function saveForm() {
  CONFIG.eyebrow = document.getElementById('fEyebrow').value;
  CONFIG.title = document.getElementById('fTitle').value;
  CONFIG.subtitle = document.getElementById('fSubtitle').value;
  var msg = document.getElementById('fMessage').value.replace(/\n/g,'<br>').replace(/周六/g,'<em>周六</em>');
  CONFIG.message = msg;
  CONFIG.date = document.getElementById('fDate').value;
  CONFIG.dateLabel = document.getElementById('fDateLabel').value;
  CONFIG.time = document.getElementById('fTime').value;
  CONFIG.location = document.getElementById('fLocation').value;
  var sig = document.getElementById('fSignature').value, lines = sig.split('\n');
  CONFIG.signature = lines.length>1 ? lines[0]+'<br><span style="font-size:0.82rem;opacity:0.65;">'+lines.slice(1).join('<br>')+'</span>' : sig;
  renderCard(CONFIG);
}

var overlay = document.getElementById('editorOverlay');
document.getElementById('editBtn').addEventListener('click',function(){syncForm();overlay.classList.add('open');document.getElementById('fTitle').focus();});
document.getElementById('btnClose').addEventListener('click',function(){overlay.classList.remove('open');});
document.getElementById('btnSave').addEventListener('click',function(){saveForm();overlay.classList.remove('open');});
overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.classList.remove('open');});
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&overlay.classList.contains('open'))overlay.classList.remove('open');});

// ==========================================
// 1. GENERATE STARS (3 layers for depth)
// ==========================================
(function() {
  const starsEl = document.getElementById('stars');
  const layers = [
    { count:80, min:1, max:2, bright:0.08 },
    { count:40, min:1.5, max:3, bright:0.3 },
    { count:15, min:2, max:4, bright:0.6 },
  ];
  let html = '';
  for (const layer of layers) {
    for (let i = 0; i < layer.count; i++) {
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const size = Math.random() * (layer.max - layer.min) + layer.min;
      const dur = Math.random() * 4 + 2.5;
      const delay = Math.random() * 6;
      const isBright = Math.random() < layer.bright;
      const isWarm = Math.random() < 0.3;
      html += `<div class="star${isWarm ? ' warm' : ''}${isBright ? ' bright' : ''}" style="
        left:${x}%; top:${y}%;
        width:${size}px; height:${size}px;
        --dur:${dur}s; --delay:${delay}s;
      "></div>`;
    }
  }
  starsEl.innerHTML = html;
})();

// ==========================================
// 2. SHOOTING STARS
// ==========================================
(function() {
  const container = document.getElementById('shootingStars');
  function spawn() {
    const el = document.createElement('div');
    el.className = 'shooting-star';
    const startX = Math.random() * 70;
    const startY = Math.random() * 40;
    const dx = (Math.random() * 180 + 120) * (Math.random() > 0.5 ? 1 : -1);
    const dy = Math.random() * 100 + 60;
    const dur = Math.random() * 1.2 + 0.8;
    const delay = Math.random() * 4;
    const trail = Math.random() * 60 + 40;
    el.style.cssText = `
      left:${startX}%; top:${startY}%;
      --sdx:${dx}px; --sdy:${dy}px;
      --ssdur:${dur}s; --ssdelay:${delay}s;
      --trail:${trail}px;
    `;
    container.appendChild(el);
    el.addEventListener('animationend', () => el.remove());

    // Schedule next
    const nextDelay = Math.random() * 6000 + 4000;
    setTimeout(spawn, nextDelay);
  }
  // Initial spawns staggered
  setTimeout(spawn, 1500);
  setTimeout(spawn, 4000);
  setTimeout(spawn, 7500);
})();

// ==========================================
// 3. SPARKLE CANVAS
// ==========================================
(function() {
  const canvas = document.getElementById('sparkles');
  const ctx = canvas.getContext('2d');
  let w, h;
  const MAX = 50;
  const particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Spark {
    constructor(initAtTop) {
      this.reset(initAtTop);
    }
    reset(initAtTop) {
      this.x = Math.random() * w;
      this.y = initAtTop ? Math.random() * h : h + 15;
      this.size = Math.random() * 2.2 + 0.6;
      this.speedY = -(Math.random() * 0.55 + 0.15);
      this.speedX = (Math.random() - 0.5) * 0.35;
      this.opacity = Math.random() * 0.5 + 0.15;
      this.fadeRate = Math.random() * 0.003 + 0.0015;
      this.life = 1;
      // Color variation: gold to warm white
      const r = 230 + Math.random() * 25;
      const g = 200 + Math.random() * 40;
      const b = 140 + Math.random() * 60;
      this.color = `rgb(${r|0},${g|0},${b|0})`;
    }
    update() {
      this.y += this.speedY;
      this.x += this.speedX + Math.sin(this.y * 0.01) * 0.15;
      this.life -= this.fadeRate;
      if (this.life <= 0 || this.y < -15) this.reset(false);
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.opacity * this.life;
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (let i = 0; i < MAX; i++) particles.push(new Spark(true));

  (function loop() {
    ctx.clearRect(0, 0, w, h);
    for (const p of particles) { p.update(); p.draw(ctx); }
    requestAnimationFrame(loop);
  })();
})();

// ==========================================
// 4. 3D CARD TILT
// ==========================================
(function() {
  const cardWrapper = document.getElementById('cardWrapper');
  const cardGlow = document.getElementById('cardGlow');
  const scene = document.getElementById('cardScene');
  let tiltActive = false;

  function updateTilt(clientX, clientY) {
    const rect = scene.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (clientX - cx) / (rect.width / 2);
    const dy = (clientY - cy) / (rect.height / 2);

    const maxAngle = 12; // degrees
    const rotateY = dx * maxAngle;
    const rotateX = -dy * maxAngle;

    cardWrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    cardGlow.style.opacity = Math.min(Math.abs(dx) + Math.abs(dy), 1) * 0.6 + 0.3;
  }

  function resetTilt() {
    cardWrapper.style.transform = 'rotateX(0deg) rotateY(0deg)';
    cardGlow.style.opacity = '0.3';
  }

  document.addEventListener('mousemove', (e) => {
    if (window.innerWidth > 768) updateTilt(e.clientX, e.clientY);
  });

  document.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) updateTilt(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  document.addEventListener('mouseleave', resetTilt);
  document.addEventListener('touchend', resetTilt);
})();

// ==========================================
// 5. CLICK SPARKLE BURST
// ==========================================
(function() {
  document.addEventListener('click', (e) => {
    // Skip if clicking the seal (it has its own effect)
    if (e.target.closest('#seal') || e.target.closest('.editor-overlay') || e.target.closest('#editBtn')) return;

    const count = 14;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'burst-particle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
      const dist = Math.random() * 60 + 25;
      const bx = Math.cos(angle) * dist;
      const by = Math.sin(angle) * dist;
      const life = Math.random() * 0.6 + 0.5;
      el.style.cssText = `
        left:${e.clientX}px; top:${e.clientY}px;
        --bx:${bx}px; --by:${by}px;
        --blife:${life}s;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  });
})();

// ==========================================
// 6. WAX SEAL INTERACTION
// ==========================================
(function() {
  const seal = document.getElementById('seal');
  const card = document.getElementById('card');

  seal.addEventListener('click', (e) => {
    e.stopPropagation();

    // Ripple
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    seal.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());

    // Hearts burst
    const hearts = ['💕', '✨', '💖', '💫', '🩷', '🌟', '💗', '💝'];
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('span');
      el.className = 'heart-particle';
      el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      el.style.left = e.clientX + 'px';
      el.style.top = e.clientY + 'px';
      el.style.setProperty('--rot', (Math.random() - 0.5) * 80 + 'deg');
      el.style.animationDelay = (i * 0.06) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // Card micro-bounce
    card.style.transition = 'transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)';
    card.style.transform = 'scale(1.03)';
    setTimeout(() => {
      card.style.transform = 'scale(1)';
      setTimeout(() => { card.style.transition = ''; }, 250);
    }, 250);
  });
})();
